<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/github-markdown-light.min.css">
    <link rel="stylesheet" href="css/github.min.css">
    <style>
        body {
            margin: 0;
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        }
        .markdown-body {
            box-sizing: border-box;
            min-width: 200px;
            max-width: 980px;
            margin: 0 auto;
            padding: 24px;
            background: white;
            border-radius: 0px;
        }
        img {
            max-width: 100%;
            height: auto;
        }
        pre {
            position: relative;
            margin: 1em 0 !important;
            padding: 0;
            background: transparent !important;
            border: 1px solid #F3F2F0 !important;
            border-radius: 14px !important;
            overflow: hidden;
            box-shadow: none !important;
        }
        pre code.hljs {
            display: block;
            overflow-x: auto;
            padding: 16px;
            padding-top: 48px;
            background: transparent !important;
        }
        .code-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            background: transparent !important;
            z-index: 10;
            box-sizing: border-box;
        }
        .code-language {
            font-size: 12px;
            font-weight: 500;
            color: #57606a;
            background: transparent !important;
            border: none !important;
            padding: 5px 10px;
            border-radius: 0 !important;
            box-shadow: none !important;
            opacity: 0.8;
        }
        .copy-button {
            font-size: 12px;
            font-weight: 500;
            padding: 6px 16px;
            background: #ffffff;
            color: #57606a;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            cursor: pointer;
            opacity: 0;
            transition: all 0.25s ease;
            box-shadow: none !important;
        }
        pre:hover .copy-button {
            opacity: 1;
        }
        .copy-button:hover {
            background: #57606a;
            color: #24292f;
            box-shadow: none !important;
        }
        .copy-button.copied {
            color: #57606a;
            border-color: #d0d7de !important;
            background: #ffffff !important;
        }
        .copy-button.copied:hover {
            background: #ffffff !important;
        }
        .markdown-body hr {
            height: 1px !important;
            background-color: #e1e4e8 !important;
            border: none !important;
            margin: 32px 0 !important;
        }
        .markdown-body code:not(pre code),
        .markdown-body tt:not(pre tt) {
            background-color: #FCEBE3 !important;
            color: #9F3600 !important;
            border-radius: 6px !important;
            padding: .2em .4em !important;
            font-size: 85% !important;
        }
        .markdown-body table {
            border-collapse: collapse;
            background: transparent !important;
            border: none !important;
            margin: 1em 0;
            display: table;
            width: auto;
            max-width: 100%;
            overflow-x: auto;
        }
        .markdown-body table th,
        .markdown-body table td {
            padding: 12px 16px !important;
            border: none !important;
            border-bottom: 1px solid #e1e4e8 !important;
            background: transparent !important;
            text-align: left;
            vertical-align: top;
        }
        .markdown-body table tr {
            background: transparent !important;
            border-top: none !important;
        }
        .markdown-body table tr:nth-child(2n) {
            background: transparent !important;
        }
        .markdown-body table th {
            font-weight: 600;
            color: #24292f;
            border-bottom: 2px solid #d0d7de !important;
            padding-bottom: 10px !important;
        }
        .markdown-body table code,
        .markdown-body table tt {
            background-color: #FCEBE3 !important;
            color: #9F3600 !important;
            border-radius: 6px !important;
            padding: .2em .4em !important;
            font-size: 85% !important;
        }
        .markdown-body table {
            display: block;
            overflow-x: auto;
            white-space: nowrap;
        }
        @media (max-width: 768px) {
            .markdown-body table th,
            .markdown-body table td {
                padding: 8px 12px !important;
            }
        }
        .markdown-body table th:first-child,
        .markdown-body table td:first-child {
            border-left: none !important;
        }
        .markdown-body table th:last-child,
        .markdown-body table td:last-child {
            border-right: none !important;
        }
    </style>
</head>
<body>
<article class="markdown-body" id="preview"></article>
<script src="js/marked.min.js"></script>
<script src="js/highlight.min.js"></script>
<script src="js/lua.min.js"></script>
<script src="js/preview.js"></script>
</body>
</html>
